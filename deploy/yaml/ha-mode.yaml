  labels:
    app.kubernetes.io/name: replikator
    app.kubernetes.io/component: operator
spec:
  group: replikator.cloudresty.io
  names:
    kind: ClusterReplicationRule
    listKind: ClusterReplicationRuleList
    plural: clusterreplicationrules
    singular: clusterreplicationrule
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                sourceNamespace:
                  type: string
                sourceSelector:
                  type: string
                resourceTypes:
                  type: array
                  items:
                    type: string
                targetNamespaces:
                  type: object
                  properties:
                    selector:
                      type: string
                    excludes:
                      type: array
                      items:
                        type: string
                    includes:
                      type: array
                      items:
                        type: string
                targetNameTemplate:
                  type: string
                annotationsToCopy:
                  type: array
                  items:
                    type: string
                labelsToCopy:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                activeMirrors:
                  type: integer
                errors:
                  type: integer
                lastSyncTime:
                  type: string
                  format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                mirroredCount:
                  type: integer
                syncedResources:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      resourceType:
                        type: string
                      mirroredToCount:
                        type: integer
                      lastSyncedTime:
                        type: string
                        format: date-time
                condition:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
      subresources:
        status: {}

---
