---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: replikator
  labels:
    app.kubernetes.io/name: replikator
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: replikator
subjects:
  - kind: ServiceAccount
    name: replikator
    namespace: replikator

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: replikator
  namespace: replikator
  labels:
    app.kubernetes.io/name: replikator
    app.kubernetes.io/component: operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: replikator
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: replikator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: replikator
      containers:
        - name: replikator
          image: cloudresty/replikator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            - name: LOGGING_MINIMUM_LEVEL
              value: "Information"
            - name: REFLECTION_DELETE_ORPHANED_MIRRORS
              value: "false"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: replikator
  namespace: replikator
  labels:
    app.kubernetes.io/name: replikator
    app.kubernetes.io/component: operator
spec:
  ports:
    - port: 8080
      targetPort: metrics
      name: metrics
  selector:
    app.kubernetes.io/name: replikator
    app.kubernetes.io/component: operator
