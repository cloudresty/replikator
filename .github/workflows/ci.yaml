name: CI

# This CI workflow runs linting, testing, and builds for Replikator.
# It tests against multiple Go versions and includes comprehensive checks
# for code quality, security, and functionality.

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.26]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install dependencies
      run: cd app && go mod download

    - name: Verify dependencies
      run: cd app && go mod verify

    - name: Format check
      run: |
        cd app
        go fmt ./...
        git diff --exit-code

    - name: Vet
      run: cd app && go vet ./...

    - name: Run tests with coverage
      run: cd app && go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./app/coverage.out
        flags: unittests
        name: codecov-umbrella

    - name: Build binary
      run: cd app && go build -ldflags="-s -w" -o bin/replikator ./cmd/replikator

    - name: Verify binary
      run: |
        cd app
        file bin/replikator
        ls -la bin/replikator

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26
        cache: true

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.4
        working-directory: app

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for git describe

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./build/Dockerfile
        push: false
        tags: cloudresty/replikator:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  integration:
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.26
        cache: true

    - name: Create kind cluster
      uses: helm/kind-action@v1
      with:
        cluster_name: replikator-test

    - name: Build and load Docker image
      run: |
        docker build -t cloudresty/replikator:test -f ./build/Dockerfile .
        kind load docker-image cloudresty/replikator:test --name replikator-test

    - name: Install cert-manager
      run: |
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.0/cert-manager.yaml
        kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=120s
        kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
        kubectl wait --for=condition=Available deployment/cert-manager-cainjector -n cert-manager --timeout=120s

    - name: Deploy replikator operator
      run: |
        kubectl apply -f ./deploy/yaml/single-mode.yaml
        # Wait for cert-manager to issue the TLS certificate before the pods can mount it
        kubectl wait --for=condition=Ready certificate/replikator-webhook -n replikator --timeout=120s
        kubectl patch deployment replikator -n replikator --type='json' -p='[{"op": "replace", "path": "/spec/template/spec/containers/0/image", "value":"cloudresty/replikator:test"}]'
        kubectl patch deployment replikator -n replikator --type='json' -p='[{"op": "replace", "path": "/spec/template/spec/containers/0/imagePullPolicy", "value":"Never"}]'
        kubectl rollout status deployment/replikator -n replikator --timeout=120s || { kubectl describe deployment replikator -n replikator; kubectl get pods -n replikator -o wide; exit 1; }

    - name: Check replikator logs
      run: |
        # Use the deployment reference, not a pod label selector.
        # A label selector matches pods from ALL ReplicaSets including old ones
        # that are still Terminating after a rolling update, causing log commands
        # to fail. The deployment reference routes to the current active pod only.
        kubectl logs -n replikator deployment/replikator --tail=100

    - name: Create test namespaces and source secret
      run: |
        kubectl create namespace replikator-source
        kubectl create namespace replikator-target
        kubectl create secret generic my-app-config \
          --namespace replikator-source \
          --from-literal=api-key=test-value-123

    - name: Create ClusterReplicationRule
      run: |
        kubectl apply -f - <<'EOF'
        apiVersion: replikator.cloudresty.io/v1
        kind: ClusterReplicationRule
        metadata:
          name: test-replication
        spec:
          sourceNamespace: replikator-source
          sourceSelector: "my-app-config"
          resourceTypes:
            - Secret
          targetNamespaces:
            includes:
              - replikator-target
          targetNameTemplate: "my-app-config"
        EOF

    - name: Verify CRR replication
      run: |
        echo "Waiting for my-app-config to appear in replikator-target..."
        for i in $(seq 1 30); do
          if kubectl get secret my-app-config -n replikator-target 2>/dev/null; then
            echo "Secret successfully replicated on attempt $i"
            VALUE=$(kubectl get secret my-app-config -n replikator-target -o jsonpath='{.data.api-key}' | base64 -d)
            if [ "$VALUE" = "test-value-123" ]; then
              echo "Secret data matches source - replication is working correctly"
              exit 0
            else
              echo "ERROR: Secret data mismatch. Got: '$VALUE', expected: 'test-value-123'"
              exit 1
            fi
          fi
          echo "Attempt $i/30: secret not yet present, waiting 2s..."
          sleep 2
        done
        echo "ERROR: Secret was not replicated within 60 seconds"
        kubectl get clusterreplicationrule test-replication -o yaml
        kubectl logs -n replikator deployment/replikator --tail=200
        exit 1

    - name: Cleanup
      run: kubectl delete namespace replikator-source replikator-target replikator --wait

  # Build each platform in parallel on its own runner, then merge into one manifest.
  # amd64 and arm64 no longer block each other, cutting the total time roughly in half.
  docker-release-build:
    name: Build (${{ matrix.platform_tag }})
    runs-on: ${{ matrix.runs-on }}
    needs: [integration]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            platform_tag: arm64
            runs-on: ubuntu-24.04-arm  # native ARM64 runner, no QEMU emulation

    steps:
    - uses: actions/checkout@v4

    - name: Extract version from tag
      id: version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.CLR__DOCKER_HUB_USERNAME }}
        password: ${{ secrets.CLR__DOCKER_HUB_PAT }}

    - name: Build and push platform image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./build/Dockerfile
        push: true
        # Push a platform-specific tag; the merge job combines them into the final manifest.
        tags: cloudresty/replikator:${{ steps.version.outputs.tag }}-${{ matrix.platform_tag }}
        platforms: ${{ matrix.platform }}
        # Per-platform scoped cache prevents amd64 and arm64 layers from overwriting each other.
        cache-from: type=gha,scope=release-${{ matrix.platform_tag }}
        cache-to: type=gha,mode=max,scope=release-${{ matrix.platform_tag }}

  # Combine the per-platform images into a single multi-arch manifest and tag it.
  docker-release-merge:
    name: Merge multi-platform manifest
    runs-on: ubuntu-latest
    needs: [docker-release-build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Extract version from tag
      id: version
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.CLR__DOCKER_HUB_USERNAME }}
        password: ${{ secrets.CLR__DOCKER_HUB_PAT }}

    - name: Create and push multi-platform manifest
      run: |
        docker buildx imagetools create \
          --tag cloudresty/replikator:${{ steps.version.outputs.tag }} \
          --tag cloudresty/replikator:latest \
          cloudresty/replikator:${{ steps.version.outputs.tag }}-amd64 \
          cloudresty/replikator:${{ steps.version.outputs.tag }}-arm64

    - name: Inspect manifest
      run: docker buildx imagetools inspect cloudresty/replikator:${{ steps.version.outputs.tag }}
